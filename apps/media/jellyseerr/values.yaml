app-template:
  controllers:
    jellyseerr:
      pod:
        securityContext:
          runAsUser: 2000
          runAsGroup: 2000
          runAsNonRoot: true
          fsGroup: 2000
          fsGroupChangePolicy: "OnRootMismatch"

      containers:
        app:
          image:
            repository: ghcr.io/fallenbagel/jellyseerr
            tag: 2.7.3
          env:
            TZ: Europe/Berlin
            LOG_LEVEL: "info"
            PORT: &port 5055
          envFrom:
            - secretRef:
                name: jellyseerr
          probes:
            liveness: &probes
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/v1/status
                  port: *port
                initialDelaySeconds: 0
                periodSeconds: 10
                timeoutSeconds: 1
                failureThreshold: 3
            readiness: *probes
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

  service:
    app:
      controller: jellyseerr
      type: LoadBalancer
      ports:
        http:
          port: *port

  ingress:
    app:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.middlewares: kube-system-forward-auth-to-authentik@kubernetescrd
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        cert-manager.io/cluster-issuer: "letsencrypt"
      hosts:
        - host: jellyseerr.bobby-dev.de
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: jellyseerr-tls
          hosts:
            - jellyseerr.bobby-dev.de

  persistence:
    config:
      storageClass: config
      accessMode: ReadWriteOnce
      size: 5Gi
      globalMounts:
        - path: /app/config
    tmp:
      type: emptyDir
